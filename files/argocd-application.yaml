apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gameapp
  namespace: argocd

spec:

  project: default

  source:

    repoURL: https://github.com/abhaysahu403/SnackGame.git

    targetRevision: main

    path: k8s

  destination:

    server: https://kubernetes.default.svc

    namespace: gameapp

  syncPolicy:

    automated:

      prune: true

      selfHeal: true

    syncOptions:

    - CreateNamespace=true


